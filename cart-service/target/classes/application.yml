server:
  port: 8083

spring:
  application:
    name: cart-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090}/realms/akaslan/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: ${EUREKA_PREFER_IP:false}

integration:
  cart:
    internal-api-key: ${INTERNAL_API_KEY:local-dev-internal-key}


