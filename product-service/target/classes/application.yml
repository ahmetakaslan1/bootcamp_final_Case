server:
  port: 8081

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/product_db
    username: ${DB_USERNAME:akaslan_prod}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  cache:
    type: redis
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090}/realms/akaslan/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: ${EUREKA_PREFER_IP:false}


