server:
  port: 8084

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-db}:5432/order_db
    username: ${DB_USERNAME:akaslan_prod}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak-server:8080}/realms/akaslan/protocol/openid-connect/certs
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq-server}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-server}:8761/eureka/
  instance:
    prefer-ip-address: true

integration:
  cart:
    internal-api-key: ${INTERNAL_API_KEY:local-dev-internal-key}
