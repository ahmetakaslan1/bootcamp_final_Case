version: '3.8'

services:

  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq-server:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-server
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak-server
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
    ports:
      - "9090:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==========================================
  # SPRING BOOT MICROSERVICES
  # ==========================================
  discovery-server:
    build: 
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE_NAME: discovery-server
    container_name: discovery-server
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_PREFER_IP=true
    networks:
      - ecommerce-net
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq-server:
        condition: service_healthy

  api-gateway:
    build: 
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE_NAME: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080" # API Gateway dışarı açtım
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_PREFER_IP=true
      - FRONTEND_URL=${FRONTEND_URL}
      - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
    networks:
      - ecommerce-net
    depends_on:
      - discovery-server
      - keycloak

  product-service:
    build: 
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE_NAME: product-service
    container_name: product-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_PREFER_IP=true
      - DB_HOST=postgres-db
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
    networks:
      - ecommerce-net
    depends_on:
      - discovery-server
      - postgres-db

  inventory-service:
    build: 
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE_NAME: inventory-service
    container_name: inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_PREFER_IP=true
      - DB_HOST=postgres-db
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - RABBITMQ_HOST=rabbitmq-server
      - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
    networks:
      - ecommerce-net
    depends_on:
      - discovery-server
      - postgres-db
      - rabbitmq-server

  order-service:
    build: 
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE_NAME: order-service
    container_name: order-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_PREFER_IP=true
      - DB_HOST=postgres-db
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - RABBITMQ_HOST=rabbitmq-server
      - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
    networks:
      - ecommerce-net
    depends_on:
      - discovery-server
      - postgres-db
      - rabbitmq-server

  cart-service:
    build: 
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE_NAME: cart-service
    container_name: cart-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_PREFER_IP=true
      - REDIS_HOST=redis-cache
      - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
    networks:
      - ecommerce-net
    depends_on:
      - discovery-server
      - redis-cache

  payment-service:
    build: 
      context: .
      dockerfile: Dockerfile.spring
      args:
        SERVICE_NAME: payment-service
    container_name: payment-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_PREFER_IP=true
      - DB_HOST=postgres-db
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - RABBITMQ_HOST=rabbitmq-server
      - KEYCLOAK_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
    networks:
      - ecommerce-net
    depends_on:
      - discovery-server
      - postgres-db
      - rabbitmq-server

  # ==========================================
  # NEXT.JS FRONTEND
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextjs-frontend
    ports:
      - "3000:3000"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
      - NEXT_PUBLIC_API_URL=${FRONTEND_URL}/api/v1
    networks:
      - ecommerce-net
    depends_on:
      - api-gateway

networks:
  ecommerce-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
